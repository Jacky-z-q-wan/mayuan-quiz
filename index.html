"type":"多选题","answer":"ADE","question":"矛盾的同一性在事物发展中的作用是","source_page":29,"type_inferred":false,"options":[{"label":"A","text":"同一性是事物存在和发展的前提"},{"label":"B","text":"促使事物灭亡"},{"label":"C","text":"促使矛盾激化"},{"label":"D","text":"使矛盾双方相互吸收有利于自身的因素而发展"},{"label":"E","text":"规定事物转化的可能和发展的趋势"}]},{"id":146,"type":"多选题","answer":"ABCDE","question":"唯物辩证法认为，规律是","source_page":29,"type_inferred":false,"options":[{"label":"A","text":"事物的本质联系"},{"label":"B","text":"事物的必然联系"},{"label":"C","text":"事物的稳定联系"},{"label":"D","text":"客观的"},{"label":"E","text":"事物本身固有的"}]},{"id":147,"type":"多选题","answer":"ABCD","question":"实践在认识活动中的决定作用表现在","source_page":29,"type_inferred":false,"options":[{"label":"A","text":"实践是认识的来源"},{"label":"B","text":"实践是认识发展的动力"},{"label":"C","text":"实践是认识的目的"},{"label":"D","text":"实践是检验认识真理性的唯一标准"}]},{"id":148,"type":"多选题","answer":"ABC","question":"唯物主义和唯心主义认识论的不同表现在","source_page":29,"type_inferred":false,"options":[{"label":"A","text":"唯物主义认识论承认物质第一性，意识第二性"},{"label":"B","text":"唯物主义认识论坚持从物到感觉和思想的认识路线"},{"label":"C","text":"唯物主义认识论承认认识是主体对客体的反映"},{"label":"D","text":"唯物主义认识论认为人的认识是主观自生的"},{"label":"E","text":"唯物主义认识论认为人的认识是上帝的启示"}]},{"id":149,"type":"多选题","answer":"ABCDE","question":"价值和真理在实践中是辩证统一的，表现在","source_page":29,"type_inferred":false,"options":[{"label":"A","text":"真理既是制约实践的客观尺度，又是实践追求的价值目标之一"},{"label":"B","text":"价值则是实践追求的根本目标，同时又是制约实践的主体尺度"},{"label":"C","text":"成功的实践必然是以真理和价值的辩证统一为前提"},{"label":"D","text":"价值的形成和实现以坚持真理为前提，而真理又必然是具有价值的"},{"label":"E","text":"真理和价值在实践和认识活动中是相互制约、相互引导、相互促进的"}]},{"id":150,"type":"多选题","answer":"ABCDE","question":"辩证唯物主义和旧唯物主义（即形而上学唯物主义）虽然都坚持反映论，但二者之间又有着性质上的区别，具体表现在","source_page":30,"type_inferred":false,"options":[{"label":"A","text":"辩证唯物主义是能动的反映论；旧唯物主义是消极、直观的反映论"},{"label":"B","text":"辩证唯物主义的认识论把实践的观点引入了认识论；旧唯物主义离开实践考察认识问题"},{"label":"C","text":"辩证唯物主义的认识论把辩证法应用于反映论；旧唯物主义不了解认识的辩证性质"},{"label":"D","text":"辩证唯物主义的认识论认为认识是一个不断发展的过程；旧唯物主义认为认识是一次性完成的"},{"label":"E","text":"辩证唯物主义的认识论认为认识具有摹写性和创造性；旧唯物主义只看到认识"}]},{"id":151,"type":"多选题","answer":"ABCE","question":"的摹写性新中国成立后，我们按照李四光的学说勘探石油，在所谓“贫油”的中国发现了丰富的石油储藏。而在人口问题上，马寅初的理论却长期未予重视，致使人口增长过快，给社会主义建设事业带来很大困难，这说明","source_page":30,"type_inferred":false,"options":[{"label":"A","text":"真理的内容是客观的"},{"label":"B","text":"实践是检验真理的唯一标准"},{"label":"C","text":"意识对物质具有能动的作用"},{"label":"D","text":"科学理论是检验真理的标准"},{"label":"E","text":"用科学理论指导实践，才能使人们对客观事物的认识少走弯路"}]},{"id":152,"type":"多选题","answer":"ABCE","question":"下列属于辩证唯物主义认识论的观点有","source_page":30,"type_inferred":false,"options":[{"label":"A","text":"“人类的一切认识，都具有相对性”"},{"label":"B","text":"“任何具体真理都带有近似正确的性质”"},{"label":"C","text":"“没有革命的理论，就不会有革命的运动”"},{"label":"D","text":"“真理是有用的，有用的是真理”"},{"label":"E","text":"“只要再多走一小步，仿佛是向同一方向迈的一小步，真理便会变成错误”"}]},{"id":153,"type":"多选题","answer":"AD","question":"辩证的认识运动包括两次飞跃，它们是","source_page":31,"type_inferred":false,"options":[{"label":"A","text":"从感性认识上升到理性认识"},{"label":"B","text":"从理性认识又回到感性认识"},{"label":"C","text":"从实践到新的实践"},{"label":"D","text":"从理性认识到实践"},{"label":"E","text":"从具体认识到抽象认识"}]},{"id":154,"type":"多选题","answer":"ABC","question":"社会存在是社会生活的物质方面，主要包括","source_page":31,"type_inferred":false,"options":[{"label":"A","text":"自然地理环境"},{"label":"B","text":"人口因素"},{"label":"C","text":"物质生产方式"},{"label":"D","text":"上层建筑"},{"label":"E","text":"社会结构"}]},{"id":155,"type":"多选题","answer":"CE","question":"马克思主义认为，阶级斗争","source_page":31,"type_inferred":false,"options":[{"label":"A","text":"是一切社会发展的动力"},{"label":"B","text":"是阶级社会发展的根本动力"},{"label":"C","text":"是阶级社会发展的直接动力"},{"label":"D","text":"是生产力与生产关系矛盾的根源"},{"label":"E","text":"阶级斗争受社会历史条件的制约，它的作用是历史的、变化的"}]},{"id":156,"type":"多选题","answer":"BCD","question":"下列各项属于生产关系内容的有","source_page":31,"type_inferred":false,"options":[{"label":"A","text":"人与各种自然资源的关系"},{"label":"B","text":"生产资料所有制形式"},{"label":"C","text":"产品的分配形式"},{"label":"D","text":"人们在生产中的地位及其相互关系"},{"label":"E","text":"人和人之间的政治关系"}]},{"id":157,"type":"多选题","answer":"ABCDE","question":"关于马克思主义的阶级分析方法，下列说法正确的有","source_page":31,"type_inferred":false,"options":[{"label":"A","text":"坚持阶级分析方法，就是运用马克思主义的阶级和阶级斗争观点去观察和认识阶级社会的社会历史现象"},{"label":"B","text":"阶级分析方法为我们透过复杂的阶级社会现象，认识阶级社会的本质和规律，提供了科学的指导"},{"label":"C","text":"阶级分析方法要求全面、动态地分析阶级状况，分析各阶级的经济地位、政治立场和意识形态，准确把握各阶级之间的关系和阶级力量的对比及其变化，把握社会运动和社会生活的脉搏"},{"label":"D","text":"在认识和处理阶级矛盾时，要严格区分阶级矛盾和非阶级矛盾、对抗阶级之间的矛盾和非对抗阶级之间的矛盾，以及敌我矛盾和人民内部矛盾"},{"label":"E","text":"阶级分析方法是马克思主义政党制定正确路线、方针、政策和策略的重要依"}]},{"id":158,"type":"多选题","answer":"ABCD","question":"据杰出人物在历史的发展过程中起着特殊的作用，主要表现在","source_page":32,"type_inferred":false,"options":[{"label":"A","text":"他们比一般人站得高、看得远，解决历史任务的愿望比一般人强烈"},{"label":"B","text":"先进阶级的政治代表人物，特别是无产阶级的领袖人物所提出的思想能够成为社会变革的先导，他们为群众指明革命斗争的方向，在革命斗争中起着领导核心的作用"},{"label":"C","text":"有些占统治地位的剥削阶级的政治代表，在特定的条件下运用其权力满足了社会某些方面的需要，对历史发展也会起到某种甚至是重大的促进作用"},{"label":"D","text":"杰出的科学家、思想家、艺术家、教育家等的创造性活动，对于人类科学文化的发展和社会进步有着巨大的推动作用"},{"label":"E","text":"杰出人物可以选择社会历史发展的方向"}]},{"id":159,"type":"单选题","answer":"B","question":"使用价值不同的商品之所以能按一定比例相交换，是因为它们都有价值，而价值可以互相比较是因为","source_page":32,"type_inferred":false,"options":[{"label":"A","text":"价值是一切劳动产品所共有的属性"},{"label":"B","text":"价值在质的规定性上是相同的"},{"label":"C","text":"价值是具体劳动创造的"},{"label":"D","text":"价值和使用价值具有同一性"}]},{"id":160,"type":"单选题","answer":"A","question":"马克思说:“就使用价值说，有意义的只是商品中包含的劳动的质；就价值量说，有意义的只是商品中包含的劳动的量,不过这种劳动已经转化为没有质的区别的人类劳动。”这里所说的没有质的区别的人类劳动是指","source_page":32,"type_inferred":false,"options":[{"label":"A","text":"抽象劳动"},{"label":"B","text":"具体劳动"},{"label":"C","text":"脑力劳动"},{"label":"D","text":"体力劳动"}]},{"id":161,"type":"单选题","answer":"D","question":"“既然商品的价值由生产商品所耗费的劳动量来决定，那么一个人越懒，越不熟练，他的商品就越有价值，因为他制造商品需要花费的时间越多。”这个说法的错误在于混淆了","source_page":33,"type_inferred":false,"options":[{"label":"A","text":"具体劳动时间和抽象劳动时间"},{"label":"B","text":"简单劳动时间和复杂劳动时间"},{"label":"C","text":"必要劳动时间和剩余劳动时间"},{"label":"D","text":"个别劳动时间和社会必要劳动时间"}]},{"id":162,"type":"单选题","answer":"C","question":"在其他条件不变的情况下，随着社会劳动生产率提高而提高的是","source_page":33,"type_inferred":false,"options":[{"label":"A","text":"单个商品的价值量"},{"label":"B","text":"单位时间的价值量"},{"label":"C","text":"单位时间生产的商品数量"},{"label":"D","text":"单个商品的社会必要劳动时间"}]},{"id":163,"type":"单选题","answer":"D","question":"马克思指出:“不管生产力发生了什么变化，同一劳动在同样的时间内提供的价值量总是相同的。但它在同样的时间内提供的使用价值量会是不同的：生产力提高时就多些，生产力降低时就少些。”这表明，提高劳动生产率会使单位时间内生产的商品数量和个别商品的价值量发生变化，即","source_page":33,"type_inferred":false,"options":[{"label":"A","text":"商品数量增加，个别商品的价值量增大"},{"label":"B","text":"商品数量增加，单位时间内生产的总价值量增大"},{"label":"C","text":"商品数量增加，个别商品的价值量不变"},{"label":"D","text":"商品数量增加，个别商品的价值量减少"}]},{"id":164,"type":"单选题","answer":"D","question":"货币所有者只有购买到劳动力这种特殊商品，货币才能转化为资本，这是因为","source_page":33,"type_inferred":false,"options":[{"label":"A","text":"劳动力商品具有使用价值和价值"},{"label":"B","text":"实际生产过程中所耗费的生产资料和消费资料必须得到实物的替换"},{"label":"C","text":"劳动力商品是资本的本质"},{"label":"D","text":"劳动力商品在消费过程中能够创造出比自身价值更大的价值"}]},{"id":165,"type":"单选题","answer":"D","question":"价值增殖过程是剩余价值的生产过程，这是资本主义生产过程的主要方面。所谓价值增殖过程，是超过了一定点而延长了的价值形成过程，这里的“一定点”指的是雇佣工人","source_page":34,"type_inferred":false,"options":[{"label":"A","text":"转移生产资料价值的时间"},{"label":"B","text":"转移劳动力价值的时间"},{"label":"C","text":"创造使用价值的时间"},{"label":"D","text":"再生产自己劳动力价值的时间"}]},{"id":166,"type":"单选题","answer":"A","question":"剩余价值产生的唯一源泉是","source_page":34,"type_inferred":false,"options":[{"label":"A","text":"雇佣劳动者的剩余劳动"},{"label":"B","text":"雇佣劳动者的必要劳动"},{"label":"C","text":"雇佣劳动者的具体劳动"},{"label":"D","text":"雇佣劳动者的抽象劳动"}]},{"id":167,"type":"单选题","answer":"B","question":"剩余价值率反映的是","source_page":34,"type_inferred":false,"options":[{"label":"A","text":"预付资本的价值增殖程度"},{"label":"B","text":"资本家对工人的剥削程度"},{"label":"C","text":"固定资本的价值增殖程度"},{"label":"D","text":"不变资本的价值增殖程度"}]},{"id":168,"type":"单选题","answer":"C","question":"马克思在谈到资本主义生产方式时指出：“生产剩余价值或赚钱，是这个生产方式的绝对规律。”生产剩余价值有两种基本方法：绝对剩余价值生产和相对剩余价值生产。资本家普遍获得相对剩余价值是","source_page":34,"type_inferred":false,"options":[{"label":"A","text":"各个资本家普遍延长雇佣工人工作日的结果"},{"label":"B","text":"各个资本家普遍提高雇佣工人劳动强度的结果"},{"label":"C","text":"各个资本家追求超额剩余价值的结果"},{"label":"D","text":"个别企业提高劳动生产率的结果"}]},{"id":169,"type":"单选题","answer":"B" r":"ABCE","question":"国家垄断资本主义产生的原因包括","source_page":43,"type_inferred":false,"options":[{"label":"A","text":"社会生产力的发展，要求资本主义生产资料在更大范围内被支配"},{"label":"B","text":"经济波动和经济危机的深化"},{"label":"C","text":"缓和社会矛盾，协调利益关系"},{"label":"D","text":"工人运动的需求"},{"label":"E","text":"科技进步和生产社会化程度进一步提高"}]},{"id":212,"type":"多选题","answer":"AB","question":"资本主义萌芽于14世纪末15世纪初地中海沿岸的一些城市。资本主义产生的途径有两个","source_page":43,"type_inferred":false,"options":[{"label":"A","text":"从小商品经济分化出来"},{"label":"B","text":"从商人和高利贷者转化而来"},{"label":"C","text":"暴力掠夺"},{"label":"D","text":"资本家勤俭节约"}]},{"id":213,"type":"多选题","answer":"ACD","question":"空想社会主义不是成熟的社会革命理论，因为","source_page":43,"type_inferred":false,"options":[{"label":"A","text":"没有找到实现理想社会的现实道路"},{"label":"B","text":"没有看到资本主义必然灭亡的命运"},{"label":"C","text":"没有揭示资本主义必然灭亡的经济根源"},{"label":"D","text":"没有看到埋葬资本主义的力量"}]},{"id":214,"type":"多选题","answer":"AC","question":"共产主义理想一定会实现的依据是","source_page":43,"type_inferred":false,"options":[{"label":"A","text":"以人类社会发展规律为依据"},{"label":"B","text":"以人类都会对美好境界的追求为依据"},{"label":"C","text":"以资本主义社会的基本矛盾发展为依据"},{"label":"D","text":"以广大人民群众的主观愿望为依据"}]},{"id":215,"type":"多选题","answer":"BCD","question":"金融寡头是","source_page":43,"type_inferred":false,"options":[{"label":"A","text":"工业垄断资本与银行垄断资本的融合"},{"label":"B","text":"操纵国民经济命脉，并在实际上控制国家政权的少数垄断资本家或垄断资本家集团"},{"label":"C","text":"以金融资本形成为基础的"},{"label":"D","text":"垄断资本主义国家事实上的统治者"}]},{"id":216,"type":"多选题","answer":"BCD","question":"下列关于“共产主义社会”的表述，错误的是","source_page":44,"type_inferred":false,"options":[{"label":"A","text":"共产主义社会是人类自由自觉历史的开端"},{"label":"B","text":"共产主义社会是一种没有任何矛盾的社会"},{"label":"C","text":"共产主义社会是人类历史的终结"},{"label":"D","text":"共产主义社会是一种静止状态的社会"}]},{"id":217,"type":"多选题","answer":"ACD","question":"共产主义社会的基本特征是","source_page":44,"type_inferred":false,"options":[{"label":"A","text":"物质财富极大丰富，消费资料按需分配"},{"label":"B","text":"个人消费品实行“各尽所能、按劳分配”制度"},{"label":"C","text":"每个人自由而全面的发展，人类从必然王国向自由王国飞跃"},{"label":"D","text":"社会关系高度和谐，人们精神境界极大提高"}]},{"id":218,"type":"多选题","answer":"ABD","question":"列宁指出：“一切民族都将走向社会主义，这是不可避免的，但是一切民族的走法却不会完全一样，在民主的这种或那种形式上，在无产阶级专政的这种或那种形态上，在社会生活各方面的社会主义改造的速度上，每个民族都会有自己的特点。”这一论述从历史唯物主义的高度揭示了各民族发展道路的多样性的内涵，下列关于社会主义发展道路多样性特点的正确观点有","source_page":44,"type_inferred":false,"options":[{"label":"A","text":"时代和实践的不断发展是造成社会主义发展道路多样性的现实原因"},{"label":"B","text":"历史文化传统的差异性是造成不同国家社会主义发展道路多样性的重要条件"},{"label":"C","text":"各国民族因素和地理环境的不同是造成社会主义发展道路多样性的决定因素"},{"label":"D","text":"各国生产力发展状况和社会发展阶段决定了社会主义发展道路具有不同的特"}]},{"id":219,"type":"多选题","answer":"ABD","question":"点与第二次世界大战之前的资本主义相比，当代资本主义生产关系中的社会阶层、阶级结构发生了许多新的变化，主要表现在","source_page":44,"type_inferred":false,"options":[{"label":"A","text":"知识型和服务型劳动者数量随科技革命不断深入而持续地增加"},{"label":"B","text":"资本家由从前的直接生产经营者变成了以剪息票为生的食利者"},{"label":"C","text":"职工持股和参与决策使得劳动者成为资本家集团的重要力量"},{"label":"D","text":"高级职业经理成为资本主义社会大公司经营活动的实际控制者"}]},{"id":220,"type":"多选题","answer":"AC","question":"“资本主义必然灭亡、社会主义必然胜利”的根本依据是","source_page":44,"type_inferred":false,"options":[{"label":"A","text":"人类社会发展规律"},{"label":"B","text":"人的本质理论"},{"label":"C","text":"资本主义基本矛盾"},{"label":"D","text":"阶级斗争理论"}]},{"id":221,"type":"多选题","answer":"CD","question":"马克思指出，所谓资本原始积累“只不过是生产者和生产资料分离的历史过程。这个过程所以表现为‘原始的’，因为它形成资本以及与之相适应的生产方式的前史，”资本原始积累的主要途径有","source_page":45,"type_inferred":false,"options":[{"label":"A","text":"用资本手段获取市场暴利"},{"label":"B","text":"用剥削手段榨取剩余价值"},{"label":"C","text":"用暴力手段掠夺货币财富"},{"label":"D","text":"用暴力手段剥夺农民土地"}]},{"id":222,"type":"多选题","answer":"AB","question":"劳动力成为商品，标志着简单商品生产发展到资本主义商品生产的新阶段。劳动力是特殊的商品，其特殊性表现在劳动力商品","source_page":45,"type_inferred":false,"options":[{"label":"A","text":"能创造比自身价值更大的价值"},{"label":"B","text":"其使用价值是价值的源泉"},{"label":"C","text":"其价值与社会劳动生产率的变化无关"},{"label":"D","text":"具有价值和使用价值"}]},{"id":223,"type":"多选题","answer":"ABC","question":"社会主义发展道路具有多样性，无产阶级执政党必须领导本国人民，努力探索适合本国国情的社会主义发展道路。探索社会主义发展道路，必须","source_page":45,"type_inferred":false,"options":[{"label":"A","text":"坚持对待马克思主义的科学态度"},{"label":"B","text":"从当时当地的历史条件出发，坚持“走自己的路”"},{"label":"C","text":"充分吸收人类一切文明成果"},{"label":"D","text":"从个别归纳出一条适合社会主义国家的道路和模式"}]},{"id":224,"type":"多选题","answer":"ABC","question":"1894年，恩格斯在回答意大利人卡内帕提出的要求尽量用简短的字句来表述未来的社会主义纪元的基本思想时指出，除了从《共产党宣言》中摘出下面一段话外,再也找不出合适的了,这就是:“代替那存在着阶级和阶级对立的资产阶级旧社会的,将是这样一个联合体,在那里，每个人的自由发展是一切人的自由发展的条件。”这里所说的自由发展是指","source_page":45,"type_inferred":false,"options":[{"label":"A","text":"建立在个体高度自由自觉基础上的发展"},{"label":"B","text":"实现了人的“自由个性”的发展"},{"label":"C","text":"摆脱了对“人的依赖关系”和对“物的依赖性”"},{"label":"D","text":"一部分人的自由发展"}]},{"id":225,"type":"多选题","answer":"ABC","question":"在当代资本主义生产关系中，社会阶层、阶级结构发生了新的变化，主要表现在","source_page":46,"type_inferred":false,"options":[{"label":"A","text":"资本家的地位和作用已经发生很大变化"},{"label":"B","text":"高级职业经理成为大公司经营活动的实际控制者"},{"label":"C","text":"知识型和服务型劳动者的数量不断增加，劳动方式发生了新变化"},{"label":"D","text":"政治制度出现多元化趋势，公民权利有所扩大"}]},{"id":226,"type":"多选题","answer":"ABC","question":"19世纪上半叶，空想社会主义发展到最高阶段，代表人物有","source_page":46,"type_inferred":false,"options":[{"label":"A","text":"圣西门"},{"label":"B","text":"傅立叶"},{"label":"C","text":"欧文"},{"label":"D","text":"托马斯·莫尔"}]},{"id":227,"type":"多选题","answer":"ABC","question":"第二次世界大战以来，从事国际经济协调、维护国际经济秩序的国际性协调组织主要有","source_page":46,"type_inferred":false,"options":[{"label":"A","text":"国际货币基金组织"},{"label":"B","text":"世界银行"},{"label":"C","text":"世界贸易组织"},{"label":"D","text":"国际卡特尔"}]},{"id":228,"type":"多选题","answer":"CD","question":"生产商品的劳动二重性是指","source_page":46,"type_inferred":false,"options":[{"label":"A","text":"简单劳动"},{"label":"B","text":"复杂劳动"},{"label":"C","text":"具体劳动"},{"label":"D","text":"抽象劳动"},{"label":"E","text":"社会劳动"}]},{"id":229,"type":"多选题","answer":"ABCD","question":"对资本主义生产方式来说，劳动力商品的特点体现在","source_page":46,"type_inferred":false,"options":[{"label":"A","text":"具有价值和使用价值两个因素"},{"label":"B","text":"劳动力价值的构成包含历史和道德的因素"},{"label":"C","text":"劳动力商品在消费过程中会创造剩余价值"},{"label":"D","text":"它的使用价值是价值的源泉"},{"label":"E","text":"它的价值是使用价值的源泉"}]},{"id":230,"type":"多选题","answer":"ABCD","question":"商品的价值量","source_page":47,"type_inferred":false,"options":[{"label":"A","text":"由生产商品的社会必要劳动时间决定"},{"label":"B","text":"与生产商品的劳动时间成正比"},{"label":"C","text":"与生产商品的劳动生产率成反比"},{"label":"D","text":"是商品交换的基础"},{"label":"E","text":"与劳动时间无关"}]},{"id":231,"type":"多选题","answer":"ABCDE","question":"货币最基本的职能有","source_page":47,"type_inferred":false,"options":[{"label":"A","text":"价值尺度"},{"label":"B","text":"流通手段"},{"label":"C","text":"贮藏手段"},{"label":"D","text":"支付手段"},{"label":"E","text":"世界货币"}]},{"id":232,"type":"多选题","answer":"AB","question":"把以生产资料形式存在的资本叫做不变资本，是由于它在生产过程中","source_page":47,"type_inferred":false,"options":[{"label":"A","text":"价值量不发生增值"},{"label":"B","text":"价值量只发生转移"},{"label":"C","text":"不转移价值"},{"label":"D","text":"不被消费"},{"label":"E","text":"不改变物质形态"}]},{"id":233,"type":"多选题","answer":"AC","question":"可变资本是","source_page":47,"type_inferred":false,"options":[{"label":"A","text":"以劳动力形态存在的那部分资本"},{"label":"B","text":"在生产过程中价值发生转移的资本"},{"label":"C","text":"在生产过程中价值发生增值的资本"},{"label":"D","text":"实物形式发生变化而价值不变的那部分资本"},{"label":"E","text":"以生产资料形态存在的资本"}]},{"id":234,"type":"多选题","answer":"ADE","question":"剩余价值率是","source_page":48,"type_inferred":false,"options":[{"label":"A","text":"剩余价值与可变资本之比"},{"label":"B","text":"剩余价值与不变资本之比"},{"label":"C","text":"剩余价值与全部资本之比"},{"label":"D","text":"剩余劳动与必要劳动之比"},{"label":"E","text":"剩余劳动时间与必要劳动时间之比"}]},{"id":235,"type":"多选题","answer":"AD","question":"超额剩余价值","source_page":48,"type_inferred":false,"options":[{"label":"A","text":"是商品个别价值低于社会价值的差额"},{"label":"B","text":"是商品个别价值高于社会价值的差额"},{"label":"C","text":"就是相对剩余价值"},{"label":"D","text":"追逐超额剩余价值会使社会劳动生产率普遍提高"},{"label":"E","text":"超额剩余价值与社会劳动生产率无关"}]},{"id":236,"type":"多选题","answer":"BCD","question":"生产自动化条件下，资本主义国家出现“无人工厂”现象，那么","source_page":48,"type_inferred":false,"options":[{"label":"A","text":"自动化的机器已经取代劳动者在生产中的主体地位"},{"label":"B","text":"“无人工厂”在本质上是不变资本的实物形式"},{"label":"C","text":"剩余价值生产所使用的生产工具更为先进了"},{"label":"D","text":"雇佣工人的剩余劳动仍然是剩余价值的源泉"},{"label":"E","text":"科技已发展成为独立的剩余价值源泉"}]},{"id":237,"type":"多选题","answer":"ADE","question":"关于资本有机构成，下列说法正确的是","source_page":48,"type_inferred":false,"options":[{"label":"A","text":"在资本主义生产过程中，资本有机构成的提高是一般趋势"},{"label":"B","text":"在资本主义生产过程中，资本有机构成的下降是一般趋势"},{"label":"C","text":"反映生产资料和劳动力比例关系的资本技术构成就是资本有机构成"},{"label":"D","text":"以技术构成为基础并反映其变化的资本价值构成就是资本有机构成"},{"label":"E","text":"资本有机构成通常用c:v 来表示"}]},{"id":238,"type":"多选题","answer":"ABCDE","question":"关于产业资本的循环运动，说法正确的是","source_page":48,"type_inferred":false,"options":[{"label":"A","text":"要经历购买、生产和售卖三个阶段"},{"label":"B","text":"要分别执行货币资本、生产资本和商品资本的职能"},{"label":"C","text":"三种职能形式的转化必须保持时间上的依次连续性"},{"label":"D","text":"三种职能形式必须在空间上同时并存"},{"label":"E","text":"产业资本的连续循环是流通过程和生产过程的统一"}]},{"id":239,"type":"多选题","answer":"CDE","question":"资本主义社会的社会总产品从价值构成上看包括","source_page":49,"type_inferred":false,"options":[{"label":"A","text":"生产资料"},{"label":"B","text":"消费资料"},{"label":"C","text":"不变资本"},{"label":"D","text":"可变资本"},{"label":"E","text":"剩余价值"}]},{"id":240,"type":"多选题","answer":"ABCD","question":"社会再生产的顺利进行，要求","source_page":49,"type_inferred":false,"options":[{"label":"A","text":"社会总产品在实物上得到替换"},{"label":"B","text":"社会总产品在价值上实现补偿"},{"label":"C","text":"两大部类的生产在规模上保持一定比例"},{"label":"D","text":"两大部类的生产在结构上保持一定比例"},{"label":"E","text":"加快资本周转的速度"}]},{"id":241,"type":"多选题","answer":"BD","question":"资本主义的意识形态","source_page":49,"type_inferred":false,"options":[{"label":"A","text":"为资本主义的经济基础服务，所以只能否定"},{"label":"B","text":"是资产阶级的阶级意识的集中体现"},{"label":"C","text":"是人类文化发展过程中的糟粕，要全盘抛弃"},{"label":"D","text":"在资本主义国家建立以前，它的社会作用主要还是进步的"},{"label":"E","text":"是资本主义上层建筑的重要组成部分，因此从未起过进步的社会作用"}]},{"id":242,"type":"多选题","answer":"ABC","question":"垄断是指少数资本主义大企业，为了获得高额利润，通过相互协议或联合，对一个或几个部门商品的生产、销售和价格进行操纵和控制，它产生的原因有","source_page":49,"type_inferred":false,"options":[{"label":"A","text":"生产集中发展到相当高的程度"},{"label":"B","text":"企业规模巨大，形成对竞争的限制"},{"label":"C","text":"竞争各方损失越来越严重"},{"label":"D","text":"企业的自愿组合"},{"label":"E","text":"企业的良性竞争"}]},{"id":243,"type":"多选题","answer":"ABDE","question":"垄断没有消除竞争，反而使竞争变得更加复杂和剧烈，这是因为","source_page":50,"type_inferred":false,"options":[{"label":"A","text":"垄断没有消除产生竞争的经济条件"},{"label":"B","text":"垄断必须通过竞争来维持"},{"label":"C","text":"垄断组织内部之间互相支持"},{"label":"D","text":"各垄断组织为了获取更多的垄断利润，相互之间必然展开激烈竞争"},{"label":"E","text":"任何垄断组织都不可能把社会生产全包下来"}]},{"id":244,"type":"多选题","answer":"ABCD","question":"垄断资本的实质在于获取垄断利润，垄断利润来源于","source_page":50,"type_inferred":false,"options":[{"label":"A","text":"对本国无产阶级和其他劳动人民剥削的加强"},{"label":"B","text":"通过垄断高价和垄断低价来控制市场，获得非垄断企业的利润"},{"label":"C","text":"通过加强对其他国家劳动人民的剥削和掠夺获取的额外利润"},{"label":"D","text":"通过国家政权进行有利于垄断资本的再分配，将国民收入的一部分变成垄断资本的收入"},{"label":"E","text":"借贷资本"}]},{"id":245,"type":"多选题","answer":"BCD","question":"国家垄断资本主义的微观规制的类型主要有","source_page":50,"type_inferred":false,"options":[{"label":"A","text":"国家运用经济政策"},{"label":"B","text":"反托拉斯法"},{"label":"C","text":"公共事业规制"},{"label":"D","text":"社会经济规制"},{"label":"E","text":"国家采取降息策略"}]},{"id":246,"type":"多选题","answer":"ACD","question":"垄断资本向世界范围扩展的基本形式有三种，包括","source_page":50,"type_inferred":false,"options":[{"label":"A","text":"借贷资本输出"},{"label":"B","text":"私人资本输出"},{"label":"C","text":"生产资本输出"},{"label":"D","text":"商品资本输出"},{"label":"E","text":"国家资本输出"}]},{"id":247,"type":"多选题","answer":"ABD","question":"资本主义社会随着生产力的发展和工人阶级反抗力量的壮大，资本家及其代理人开始采取一些缓和劳资关系的激励制度，促使工人自觉地服从资本家的意志，这些制度主要有","source_page":50,"type_inferred":false,"options":[{"label":"A","text":"职工参与决策"},{"label":"B","text":"终身雇佣"},{"label":"C","text":"鼓励加班"},{"label":"D","text":"职工持股"},{"label":"E","text":"增加劳动时间"}]},{"id":248,"type":"多选题","answer":"ABCE","question":"在当代资本主义生产关系中，阶层、阶级结构发生了新的变化，主要表现在","source_page":51,"type_inferred":false,"options":[{"label":"A","text":"资本家一般不再直接经营和管理企业"},{"label":"B","text":"高级职业经理成为大公司经营活动的实际控制者"},{"label":"C","text":"知识型和服务型劳动者的数量不断增加，劳动方式发生了新变化"},{"label":"D","text":"资本家和工人是平等合作关系"},{"label":"E","text":"蓝领减少，白领增加"}]},{"id":249,"type":"多选题","answer":"BC","question":"从输出资本的主体看，垄断资本向世界扩展的形式主要包括","source_page":51,"type_inferred":false,"options":[{"label":"A","text":"产业资本输出"},{"label":"B","text" 于旧事物之后，是新出现的事物"},{"label":"B","text":"新生事物具有新的结构和功能，能适应已经变化了的环境和条件"},{"label":"C","text":"新生事物是对旧事物的扬弃，并添加了旧事物所不能容纳的新内容"},{"label":"D","text":"在社会历史领域内，新生事物符合广大人民群众的根本利益和要求"}]}];
    const BANK_HASH = "4643fec12b88176ca2714b297b0f78fec0a43eac508541b03203b1d8f1f2b382";
    const STORE_KEY = "mayuan-quiz-h5:" + BANK_HASH;

    const byId = new Map(QUESTIONS.map((question) => [question.id, question]));
    const els = {
      typePill: document.getElementById("typePill"),
      counter: document.getElementById("counter"),
      submitted: document.getElementById("submitted"),
      progressBar: document.getElementById("progressBar"),
      sourceId: document.getElementById("sourceId"),
      questionText: document.getElementById("questionText"),
      options: document.getElementById("options"),
      result: document.getElementById("result"),
      prevBtn: document.getElementById("prevBtn"),
      submitBtn: document.getElementById("submitBtn"),
      nextBtn: document.getElementById("nextBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      resetBtn: document.getElementById("resetBtn"),
    };

    let state = loadState();

    function defaultState() {
      const order = QUESTIONS.map((question) => question.id);
      shuffle(order);
      return {
        order,
        currentPos: 0,
        answers: {},
        submitted: {},
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY));
        const ids = new Set(QUESTIONS.map((question) => question.id));
        if (
          saved &&
          Array.isArray(saved.order) &&
          saved.order.length === QUESTIONS.length &&
          saved.order.every((id) => ids.has(id))
        ) {
          saved.currentPos = clamp(saved.currentPos || 0, 0, saved.order.length - 1);
          saved.answers = saved.answers || {};
          saved.submitted = saved.submitted || {};
          return saved;
        }
      } catch (_error) {}
      return defaultState();
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function shuffle(items) {
      for (let index = items.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [items[index], items[swapIndex]] = [items[swapIndex], items[index]];
      }
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function currentQuestion() {
      return byId.get(state.order[state.currentPos]);
    }

    function selectedAnswer(question) {
      return state.answers[String(question.id)] || [];
    }

    function setResult(text, kind) {
      els.result.textContent = text;
      els.result.className = "result" + (kind ? " " + kind : "");
    }

    function render() {
      const question = currentQuestion();
      const submittedCount = Object.keys(state.submitted).length;
      const progress = ((state.currentPos + 1) / state.order.length) * 100;

      els.typePill.textContent = question.type;
      els.counter.textContent = `第 ${state.currentPos + 1} / ${state.order.length} 题`;
      els.submitted.textContent = `已提交 ${submittedCount}`;
      els.sourceId.textContent = `原题 ${question.id}`;
      els.progressBar.style.width = `${progress}%`;
      els.questionText.textContent = question.question;
      els.prevBtn.disabled = state.currentPos === 0;
      els.nextBtn.disabled = state.currentPos === state.order.length - 1;

      const selected = new Set(selectedAnswer(question));
      els.options.replaceChildren();
      question.options.forEach((option) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option" + (selected.has(option.label) ? " selected" : "");
        button.dataset.label = option.label;
        button.innerHTML = `<span class="mark">${option.label}</span><span class="option-text"></span>`;
        button.querySelector(".option-text").textContent = option.text;
        button.addEventListener("click", () => toggleOption(option.label));
        els.options.appendChild(button);
      });

      renderResult(question);
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function renderResult(question) {
      const submitted = state.submitted[String(question.id)];
      if (!submitted) {
        setResult("请选择答案后提交。", "");
        return;
      }

      if (submitted.correct) {
        setResult(`正确。答案：${question.answer}`, "ok");
        return;
      }

      const correctOptions = question.options
        .filter((option) => question.answer.includes(option.label))
        .map((option) => `${option.label}. ${option.text}`)
        .join("\n");
      setResult(`错误。正确答案：${question.answer}\n${correctOptions}`, "bad");
    }

    function toggleOption(label) {
      const question = currentQuestion();
      const key = String(question.id);
      let selected = new Set(selectedAnswer(question));

      if (question.type === "单选题") {
        selected = selected.has(label) ? new Set() : new Set([label]);
      } else if (selected.has(label)) {
        selected.delete(label);
      } else {
        selected.add(label);
      }

      const selectedList = Array.from(selected).sort();
      if (selectedList.length) {
        state.answers[key] = selectedList;
      } else {
        delete state.answers[key];
      }
      delete state.submitted[key];
      saveState();
      render();
      if (selectedList.length) {
        setResult("已修改选择，请重新提交。", "warn");
      }
    }

    function submitAnswer() {
      const question = currentQuestion();
      const key = String(question.id);
      const selected = selectedAnswer(question);
      if (!selected.length) {
        setResult("请先选择答案。", "warn");
        return;
      }

      state.submitted[key] = {
        selected,
        correct: selected.join("") === question.answer,
      };
      saveState();
      render();
    }

    function move(offset) {
      state.currentPos = clamp(state.currentPos + offset, 0, state.order.length - 1);
      saveState();
      render();
    }

    function reshuffle() {
      if (!confirm("重新打乱会保留已选和已提交记录，只改变做题顺序。继续吗？")) return;
      shuffle(state.order);
      state.currentPos = 0;
      saveState();
      render();
    }

    function resetProgress() {
      if (!confirm("确定清空所有选择、提交记录，并重新随机排序吗？")) return;
      state = defaultState();
      saveState();
      render();
    }

    els.submitBtn.addEventListener("click", submitAnswer);
    els.prevBtn.addEventListener("click", () => move(-1));
    els.nextBtn.addEventListener("click", () => move(1));
    els.shuffleBtn.addEventListener("click", reshuffle);
    els.resetBtn.addEventListener("click", resetProgress);

    render();
  </script>
